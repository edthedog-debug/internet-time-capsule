name: Ultra Global Internet Time Capsule

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture-global-memory:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Capture Ultra Global Snapshot
        run: |
          set +e
          
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE_PATH="${YEAR}/${MONTH}/${DAY}"
          
          mkdir -p "capsules/${DATE_PATH}/global"
          mkdir -p "capsules/${DATE_PATH}/countries"
          
          echo "🚀 Starting Ultra Global Capture..."
          
          # ============================================
          # GITHUB TRENDING
          # ============================================
          echo "📡 Capturing GitHub..."
          GITHUB_DATA=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/search/repositories?q=stars:>100&sort=stars&order=desc&per_page=30" 2>/dev/null)
          if echo "$GITHUB_DATA" | jq -e '.items' > /dev/null 2>&1; then
            echo "$GITHUB_DATA" | jq '[.items[] | {name: .full_name, stars: .stargazers_count, language: (.language // "Unknown"), description: (.description // ""), url: .html_url, topics: (.topics // [])}]' \
              > "capsules/${DATE_PATH}/global/github_trending.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/github_trending.json"
          fi
          echo "✅ GitHub done ($(jq 'length' capsules/${DATE_PATH}/global/github_trending.json 2>/dev/null || echo 0) repos)"

          # ============================================
          # HACKER NEWS
          # ============================================
          echo "📡 Capturing HackerNews..."
          HN_TOP=$(curl -s "https://hacker-news.firebaseio.com/v0/topstories.json" 2>/dev/null | jq '.[0:20]' 2>/dev/null)
          if [ -n "$HN_TOP" ] && [ "$HN_TOP" != "null" ]; then
            echo '[' > "capsules/${DATE_PATH}/global/hackernews.json"
            FIRST_HN=true
            for id in $(echo "$HN_TOP" | jq -r '.[]' 2>/dev/null); do
              HN_ITEM=$(curl -s "https://hacker-news.firebaseio.com/v0/item/${id}.json" 2>/dev/null)
              if [ -n "$HN_ITEM" ] && [ "$HN_ITEM" != "null" ]; then
                if [ "$FIRST_HN" = false ]; then echo ',' >> "capsules/${DATE_PATH}/global/hackernews.json"; fi
                echo "$HN_ITEM" | jq '{id: (.id // 0), title: (.title // "Untitled"), url: (.url // ""), score: (.score // 0), by: (.by // "unknown"), comments: (.descendants // 0)}' >> "capsules/${DATE_PATH}/global/hackernews.json"
                FIRST_HN=false
              fi
              sleep 0.03
            done
            echo ']' >> "capsules/${DATE_PATH}/global/hackernews.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/hackernews.json"
          fi
          echo "✅ HackerNews done ($(jq 'length' capsules/${DATE_PATH}/global/hackernews.json 2>/dev/null || echo 0) stories)"

          # ============================================
          # STACKOVERFLOW
          # ============================================
          echo "📡 Capturing StackOverflow..."
          SO_DATA=$(curl -s "https://api.stackexchange.com/2.3/questions?order=desc&sort=hot&site=stackoverflow&pagesize=20" 2>/dev/null)
          if echo "$SO_DATA" | jq -e '.items' > /dev/null 2>&1; then
            echo "$SO_DATA" | jq '[.items[] | {title: (.title // "Untitled"), score: (.score // 0), views: (.view_count // 0), answers: (.answer_count // 0), tags: (.tags // []), link: (.link // "")}]' \
              > "capsules/${DATE_PATH}/global/stackoverflow.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/stackoverflow.json"
          fi
          echo "✅ StackOverflow done ($(jq 'length' capsules/${DATE_PATH}/global/stackoverflow.json 2>/dev/null || echo 0) questions)"

          # ============================================
          # REDDIT
          # ============================================
          echo "📡 Capturing Reddit..."
          REDDIT_DATA=$(curl -s -H "User-Agent: TimeCapsule/1.0" \
            "https://www.reddit.com/r/all/hot.json?limit=20&raw_json=1" 2>/dev/null)
          if echo "$REDDIT_DATA" | jq -e '.data.children' > /dev/null 2>&1; then
            echo "$REDDIT_DATA" | jq '[.data.children[] | {title: (.data.title // "Untitled"), subreddit: (.data.subreddit // "unknown"), score: (.data.score // 0), comments: (.data.num_comments // 0), url: (.data.url // ""), author: (.data.author // "unknown")}]' \
              > "capsules/${DATE_PATH}/global/reddit.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/reddit.json"
          fi
          echo "✅ Reddit done ($(jq 'length' capsules/${DATE_PATH}/global/reddit.json 2>/dev/null || echo 0) posts)"

          # ============================================
          # WIKIPEDIA (15 languages - expanded for global coverage)
          # ============================================
          echo "📡 Capturing Wikipedia..."
          for lang in en es fr de ja zh ar ru pt hi it nl pl sv ko; do
            WIKI_DATA=$(curl -s "https://${lang}.wikipedia.org/w/api.php?action=query&list=mostviewed&format=json&pvimlimit=15" 2>/dev/null)
            if echo "$WIKI_DATA" | jq -e '.query.mostviewed' > /dev/null 2>&1; then
              echo "$WIKI_DATA" | jq "{lang: \"${lang}\", articles: [.query.mostviewed[] | {title: (.title // \"Unknown\"), views: (.views // 0)}]}" \
                > "capsules/${DATE_PATH}/global/wikipedia_${lang}.json"
            else
              echo "{\"lang\":\"${lang}\",\"articles\":[]}" > "capsules/${DATE_PATH}/global/wikipedia_${lang}.json"
            fi
            sleep 0.15
          done
          echo "✅ Wikipedia done (15 languages)"

          # ============================================
          # EXCHANGE RATES
          # ============================================
          echo "📡 Capturing Exchange Rates..."
          FOREX_DATA=$(curl -s "https://open.er-api.com/v6/latest/USD" 2>/dev/null)
          if echo "$FOREX_DATA" | jq -e '.rates' > /dev/null 2>&1; then
            echo "$FOREX_DATA" | jq '{base: (.base_code // "USD"), updated: (.time_last_update_utc // "unknown"), rates: (.rates // {})}' \
              > "capsules/${DATE_PATH}/global/exchange_rates.json"
          else
            echo '{"base":"USD","rates":{},"updated":"unavailable"}' > "capsules/${DATE_PATH}/global/exchange_rates.json"
          fi
          echo "✅ Exchange Rates done ($(jq '.rates | length' capsules/${DATE_PATH}/global/exchange_rates.json 2>/dev/null || echo 0) currencies)"

          # ============================================
          # CRYPTO (CoinGecko)
          # ============================================
          echo "📡 Capturing Crypto..."
          CRYPTO_DATA=$(curl -s "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=30&page=1&sparkline=false" 2>/dev/null)
          if echo "$CRYPTO_DATA" | jq -e '.[0].id' > /dev/null 2>&1; then
            echo "$CRYPTO_DATA" | jq '[.[] | {name: (.name // "Unknown"), symbol: (.symbol // "???"), price: (.current_price // 0), market_cap: (.market_cap // 0), volume_24h: (.total_volume // 0), change_24h: (.price_change_percentage_24h // 0), market_cap_rank: (.market_cap_rank // 0)}]' \
              > "capsules/${DATE_PATH}/global/crypto.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/crypto.json"
          fi
          echo "✅ Crypto done ($(jq 'length' capsules/${DATE_PATH}/global/crypto.json 2>/dev/null || echo 0) coins)"

          # ============================================
          # STOCK MARKETS - Major Global Indices
          # ============================================
          echo "📡 Capturing Stock Markets..."
          STOCK_INDICES='{
            "indices": []
          }'
          
          # US Markets
          for symbol in "^GSPC" "^DJI" "^IXIC" "^RUT"; do
            STOCK_DATA=$(curl -s "https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d" 2>/dev/null)
            if echo "$STOCK_DATA" | jq -e '.chart.result[0].meta' > /dev/null 2>&1; then
              STOCK_INDICES=$(echo "$STOCK_INDICES" | jq ".indices += [$(echo "$STOCK_DATA" | jq '{symbol: .chart.result[0].meta.symbol, name: (.chart.result[0].meta.symbol // "Unknown"), price: .chart.result[0].meta.regularMarketPrice, previous_close: .chart.result[0].meta.previousClose, change: (.chart.result[0].meta.regularMarketPrice - .chart.result[0].meta.previousClose), change_pct: ((.chart.result[0].meta.regularMarketPrice - .chart.result[0].meta.previousClose) / .chart.result[0].meta.previousClose * 100), market: "US"}')]")
            fi
            sleep 0.3
          done
          
          # European Markets
          for symbol in "^FTSE" "^GDAXI" "^FCHI" "^STOXX50E"; do
            STOCK_DATA=$(curl -s "https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d" 2>/dev/null)
            if echo "$STOCK_DATA" | jq -e '.chart.result[0].meta' > /dev/null 2>&1; then
              STOCK_INDICES=$(echo "$STOCK_INDICES" | jq ".indices += [$(echo "$STOCK_DATA" | jq '{symbol: .chart.result[0].meta.symbol, name: (.chart.result[0].meta.symbol // "Unknown"), price: .chart.result[0].meta.regularMarketPrice, previous_close: .chart.result[0].meta.previousClose, change: (.chart.result[0].meta.regularMarketPrice - .chart.result[0].meta.previousClose), change_pct: ((.chart.result[0].meta.regularMarketPrice - .chart.result[0].meta.previousClose) / .chart.result[0].meta.previousClose * 100), market: "Europe"}')]")
            fi
            sleep 0.3
          done
          
          # Asian Markets
          for symbol in "^N225" "^HSI" "^SSEC" "^BSESN" "^AXJO" "^KS11"; do
            STOCK_DATA=$(curl -s "https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d" 2>/dev/null)
            if echo "$STOCK_DATA" | jq -e '.chart.result[0].meta' > /dev/null 2>&1; then
              STOCK_INDICES=$(echo "$STOCK_INDICES" | jq ".indices += [$(echo "$STOCK_DATA" | jq '{symbol: .chart.result[0].meta.symbol, name: (.chart.result[0].meta.symbol // "Unknown"), price: .chart.result[0].meta.regularMarketPrice, previous_close: .chart.result[0].meta.previousClose, change: (.chart.result[0].meta.regularMarketPrice - .chart.result[0].meta.previousClose), change_pct: ((.chart.result[0].meta.regularMarketPrice - .chart.result[0].meta.previousClose) / .chart.result[0].meta.previousClose * 100), market: "Asia"}')]")
            fi
            sleep 0.3
          done
          
          # Latin America
          for symbol in "^MXX" "^BVSP" "^MERV"; do
            STOCK_DATA=$(curl -s "https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d" 2>/dev/null)
            if echo "$STOCK_DATA" | jq -e '.chart.result[0].meta' > /dev/null 2>&1; then
              STOCK_INDICES=$(echo "$STOCK_INDICES" | jq ".indices += [$(echo "$STOCK_DATA" | jq '{symbol: .chart.result[0].meta.symbol, name: (.chart.result[0].meta.symbol // "Unknown"), price: .chart.result[0].meta.regularMarketPrice, previous_close: .chart.result[0].meta.previousClose, change: (.chart.result[0].meta.regularMarketPrice - .chart.result[0].meta.previousClose), change_pct: ((.chart.result[0].meta.regularMarketPrice - .chart.result[0].meta.previousClose) / .chart.result[0].meta.previousClose * 100), market: "Latin America"}')]")
            fi
            sleep 0.3
          done
          
          echo "$STOCK_INDICES" > "capsules/${DATE_PATH}/global/stock_markets.json"
          echo "✅ Stock Markets done ($(jq '.indices | length' capsules/${DATE_PATH}/global/stock_markets.json 2>/dev/null || echo 0) indices)"

          # ============================================
          # SPORTS - Major Leagues & Events
          # ============================================
          echo "📡 Capturing Sports Data..."
          
          # NBA Scores (via ESPN-like public API)
          NBA_DATA=$(curl -s "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard" 2>/dev/null)
          if echo "$NBA_DATA" | jq -e '.events' > /dev/null 2>&1; then
            echo "$NBA_DATA" | jq '[.events[] | {league: "NBA", home: .competitions[0].competitors[0].team.displayName, away: .competitions[0].competitors[1].team.displayName, home_score: .competitions[0].competitors[0].score, away_score: .competitions[0].competitors[1].score, status: .status.type.name, date: .date}]' \
              > "capsules/${DATE_PATH}/global/sports_nba.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/sports_nba.json"
          fi
          
          # Premier League (Football/Soccer)
          EPL_DATA=$(curl -s "https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard" 2>/dev/null)
          if echo "$EPL_DATA" | jq -e '.events' > /dev/null 2>&1; then
            echo "$EPL_DATA" | jq '[.events[] | {league: "Premier League", home: .competitions[0].competitors[0].team.displayName, away: .competitions[0].competitors[1].team.displayName, home_score: .competitions[0].competitors[0].score, away_score: .competitions[0].competitors[1].score, status: .status.type.name, date: .date}]' \
              > "capsules/${DATE_PATH}/global/sports_premier_league.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/sports_premier_league.json"
          fi
          
          # La Liga (Spain)
          LALIGA_DATA=$(curl -s "https://site.api.espn.com/apis/site/v2/sports/soccer/esp.1/scoreboard" 2>/dev/null)
          if echo "$LALIGA_DATA" | jq -e '.events' > /dev/null 2>&1; then
            echo "$LALIGA_DATA" | jq '[.events[] | {league: "La Liga", home: .competitions[0].competitors[0].team.displayName, away: .competitions[0].competitors[1].team.displayName, home_score: .competitions[0].competitors[0].score, away_score: .competitions[0].competitors[1].score, status: .status.type.name, date: .date}]' \
              > "capsules/${DATE_PATH}/global/sports_la_liga.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/sports_la_liga.json"
          fi
          
          # Chinese Super League
          CSL_DATA=$(curl -s "https://site.api.espn.com/apis/site/v2/sports/soccer/chn.1/scoreboard" 2>/dev/null)
          if echo "$CSL_DATA" | jq -e '.events' > /dev/null 2>&1; then
            echo "$CSL_DATA" | jq '[.events[] | {league: "Chinese Super League", home: .competitions[0].competitors[0].team.displayName, away: .competitions[0].competitors[1].team.displayName, home_score: .competitions[0].competitors[0].score, away_score: .competitions[0].competitors[1].score, status: .status.type.name, date: .date}]' \
              > "capsules/${DATE_PATH}/global/sports_csl.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/sports_csl.json"
          fi
          
          # MLB (Baseball)
          MLB_DATA=$(curl -s "https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard" 2>/dev/null)
          if echo "$MLB_DATA" | jq -e '.events' > /dev/null 2>&1; then
            echo "$MLB_DATA" | jq '[.events[] | {league: "MLB", home: .competitions[0].competitors[0].team.displayName, away: .competitions[0].competitors[1].team.displayName, home_score: .competitions[0].competitors[0].score, away_score: .competitions[0].competitors[1].score, status: .status.type.name, date: .date}]' \
              > "capsules/${DATE_PATH}/global/sports_mlb.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/sports_mlb.json"
          fi
          
          # IPL Cricket (India)
          IPL_DATA=$(curl -s "https://site.api.espn.com/apis/site/v2/sports/cricket/ipl/scoreboard" 2>/dev/null)
          if echo "$IPL_DATA" | jq -e '.events' > /dev/null 2>&1; then
            echo "$IPL_DATA" | jq '[.events[] | {league: "IPL", home: .competitions[0].competitors[0].team.displayName, away: .competitions[0].competitors[1].team.displayName, home_score: .competitions[0].competitors[0].score, away_score: .competitions[0].competitors[1].score, status: .status.type.name, date: .date}]' \
              > "capsules/${DATE_PATH}/global/sports_ipl.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/sports_ipl.json"
          fi
          
          # Formula 1
          F1_DATA=$(curl -s "https://ergast.com/api/f1/current/last/results.json" 2>/dev/null)
          if echo "$F1_DATA" | jq -e '.MRData.RaceTable.Races' > /dev/null 2>&1; then
            echo "$F1_DATA" | jq '[.MRData.RaceTable.Races[] | {league: "F1", race: .raceName, circuit: .Circuit.circuitName, date: .date, results: [.Results[] | {position: .position, driver: "\(.Driver.givenName) \(.Driver.familyName)", constructor: .Constructor.name, points: .points}]}]' \
              > "capsules/${DATE_PATH}/global/sports_f1.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/sports_f1.json"
          fi
          
          echo "✅ Sports done"

          # ============================================
          # GLOBAL NEWS HEADLINES
          # ============================================
          echo "📡 Capturing News Headlines..."
          
          # Google News RSS (US)
          US_NEWS=$(curl -s "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en" 2>/dev/null)
          if [ -n "$US_NEWS" ]; then
            echo "$US_NEWS" | grep -oP '<item>.*?</item>' | head -20 | while read -r item; do
              title=$(echo "$item" | grep -oP '<title>.*?</title>' | sed 's/<[^>]*>//g' | head -1)
              link=$(echo "$item" | grep -oP '<link>.*?</link>' | sed 's/<[^>]*>//g' | head -1)
              pubDate=$(echo "$item" | grep -oP '<pubDate>.*?</pubDate>' | sed 's/<[^>]*>//g' | head -1)
              echo "{\"title\": \"$title\", \"link\": \"$link\", \"date\": \"$pubDate\", \"country\": \"US\"}"
            done | jq -s '.' > "capsules/${DATE_PATH}/global/news_us.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/news_us.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/news_us.json"
          fi
          
          # Google News RSS (China - HK edition)
          CN_NEWS=$(curl -s "https://news.google.com/rss?hl=zh-CN&gl=CN&ceid=CN:zh-Hans" 2>/dev/null)
          if [ -n "$CN_NEWS" ]; then
            echo "$CN_NEWS" | grep -oP '<item>.*?</item>' | head -20 | while read -r item; do
              title=$(echo "$item" | grep -oP '<title>.*?</title>' | sed 's/<[^>]*>//g' | head -1)
              link=$(echo "$item" | grep -oP '<link>.*?</link>' | sed 's/<[^>]*>//g' | head -1)
              pubDate=$(echo "$item" | grep -oP '<pubDate>.*?</pubDate>' | sed 's/<[^>]*>//g' | head -1)
              echo "{\"title\": \"$title\", \"link\": \"$link\", \"date\": \"$pubDate\", \"country\": \"CN\"}"
            done | jq -s '.' > "capsules/${DATE_PATH}/global/news_china.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/news_china.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/news_china.json"
          fi
          
          # Google News RSS (UK)
          UK_NEWS=$(curl -s "https://news.google.com/rss?hl=en-GB&gl=GB&ceid=GB:en" 2>/dev/null)
          if [ -n "$UK_NEWS" ]; then
            echo "$UK_NEWS" | grep -oP '<item>.*?</item>' | head -20 | while read -r item; do
              title=$(echo "$item" | grep -oP '<title>.*?</title>' | sed 's/<[^>]*>//g' | head -1)
              link=$(echo "$item" | grep -oP '<link>.*?</link>' | sed 's/<[^>]*>//g' | head -1)
              pubDate=$(echo "$item" | grep -oP '<pubDate>.*?</pubDate>' | sed 's/<[^>]*>//g' | head -1)
              echo "{\"title\": \"$title\", \"link\": \"$link\", \"date\": \"$pubDate\", \"country\": \"GB\"}"
            done | jq -s '.' > "capsules/${DATE_PATH}/global/news_uk.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/news_uk.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/news_uk.json"
          fi
          
          # Google News RSS (India)
          IN_NEWS=$(curl -s "https://news.google.com/rss?hl=en-IN&gl=IN&ceid=IN:en" 2>/dev/null)
          if [ -n "$IN_NEWS" ]; then
            echo "$IN_NEWS" | grep -oP '<item>.*?</item>' | head -20 | while read -r item; do
              title=$(echo "$item" | grep -oP '<title>.*?</title>' | sed 's/<[^>]*>//g' | head -1)
              link=$(echo "$item" | grep -oP '<link>.*?</link>' | sed 's/<[^>]*>//g' | head -1)
              pubDate=$(echo "$item" | grep -oP '<pubDate>.*?</pubDate>' | sed 's/<[^>]*>//g' | head -1)
              echo "{\"title\": \"$title\", \"link\": \"$link\", \"date\": \"$pubDate\", \"country\": \"IN\"}"
            done | jq -s '.' > "capsules/${DATE_PATH}/global/news_india.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/news_india.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/news_india.json"
          fi
          
          # Google News RSS (Japan)
          JP_NEWS=$(curl -s "https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja" 2>/dev/null)
          if [ -n "$JP_NEWS" ]; then
            echo "$JP_NEWS" | grep -oP '<item>.*?</item>' | head -20 | while read -r item; do
              title=$(echo "$item" | grep -oP '<title>.*?</title>' | sed 's/<[^>]*>//g' | head -1)
              link=$(echo "$item" | grep -oP '<link>.*?</link>' | sed 's/<[^>]*>//g' | head -1)
              pubDate=$(echo "$item" | grep -oP '<pubDate>.*?</pubDate>' | sed 's/<[^>]*>//g' | head -1)
              echo "{\"title\": \"$title\", \"link\": \"$link\", \"date\": \"$pubDate\", \"country\": \"JP\"}"
            done | jq -s '.' > "capsules/${DATE_PATH}/global/news_japan.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/news_japan.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/news_japan.json"
          fi
          
          # Google News RSS (Brazil)
          BR_NEWS=$(curl -s "https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt" 2>/dev/null)
          if [ -n "$BR_NEWS" ]; then
            echo "$BR_NEWS" | grep -oP '<item>.*?</item>' | head -20 | while read -r item; do
              title=$(echo "$item" | grep -oP '<title>.*?</title>' | sed 's/<[^>]*>//g' | head -1)
              link=$(echo "$item" | grep -oP '<link>.*?</link>' | sed 's/<[^>]*>//g' | head -1)
              pubDate=$(echo "$item" | grep -oP '<pubDate>.*?</pubDate>' | sed 's/<[^>]*>//g' | head -1)
              echo "{\"title\": \"$title\", \"link\": \"$link\", \"date\": \"$pubDate\", \"country\": \"BR\"}"
            done | jq -s '.' > "capsules/${DATE_PATH}/global/news_brazil.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/news_brazil.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/news_brazil.json"
          fi
          
          # Google News RSS (Russia)
          RU_NEWS=$(curl -s "https://news.google.com/rss?hl=ru&gl=RU&ceid=RU:ru" 2>/dev/null)
          if [ -n "$RU_NEWS" ]; then
            echo "$RU_NEWS" | grep -oP '<item>.*?</item>' | head -20 | while read -r item; do
              title=$(echo "$item" | grep -oP '<title>.*?</title>' | sed 's/<[^>]*>//g' | head -1)
              link=$(echo "$item" | grep -oP '<link>.*?</link>' | sed 's/<[^>]*>//g' | head -1)
              pubDate=$(echo "$item" | grep -oP '<pubDate>.*?</pubDate>' | sed 's/<[^>]*>//g' | head -1)
              echo "{\"title\": \"$title\", \"link\": \"$link\", \"date\": \"$pubDate\", \"country\": \"RU\"}"
            done | jq -s '.' > "capsules/${DATE_PATH}/global/news_russia.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/news_russia.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/news_russia.json"
          fi
          
          echo "✅ News done (8 countries)"

          # ============================================
          # WEATHER (25 cities)
          # ============================================
          echo "📡 Capturing Weather..."
          declare -A CITIES
          CITIES=(
            ["New_York"]="40.7128,-74.0060"
            ["London"]="51.5074,-0.1278"
            ["Tokyo"]="35.6762,139.6503"
            ["Shanghai"]="31.2304,121.4737"
            ["Mumbai"]="19.0760,72.8777"
            ["Sao_Paulo"]="-23.5505,-46.6333"
            ["Lagos"]="6.5244,3.3792"
            ["Cairo"]="30.0444,31.2357"
            ["Mexico_City"]="19.4326,-99.1332"
            ["Paris"]="48.8566,2.3522"
            ["Moscow"]="55.7558,37.6173"
            ["Sydney"]="-33.8688,151.2093"
            ["Dubai"]="25.2048,55.2708"
            ["Singapore"]="1.3521,103.8198"
            ["Toronto"]="43.6532,-79.3832"
            ["Berlin"]="52.5200,13.4050"
            ["Buenos_Aires"]="-34.6037,-58.3816"
            ["Seoul"]="37.5665,126.9780"
            ["Istanbul"]="41.0082,28.9784"
            ["Jakarta"]="-6.2088,106.8456"
            ["Bangkok"]="13.7563,100.5018"
            ["Nairobi"]="-1.2921,36.8219"
            ["Lima"]="-12.0464,-77.0428"
            ["Rome"]="41.9028,12.4964"
            ["Cape_Town"]="-33.9249,18.4241"
          )
          
          echo '{' > "capsules/${DATE_PATH}/global/weather_25_cities.json"
          FIRST_WEATHER=true
          for city in "${!CITIES[@]}"; do
            IFS=',' read -r lat lon <<< "${CITIES[$city]}"
            W_DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=auto" 2>/dev/null)
            if [ "$FIRST_WEATHER" = false ]; then echo ',' >> "capsules/${DATE_PATH}/global/weather_25_cities.json"; fi
            if echo "$W_DATA" | jq -e '.current' > /dev/null 2>&1; then
              echo "\"${city}\": $(echo "$W_DATA" | jq '.current | {temp: (.temperature_2m // 0), humidity: (.relative_humidity_2m // 0), wind: (.wind_speed_10m // 0), code: (.weather_code // 0)}')" >> "capsules/${DATE_PATH}/global/weather_25_cities.json"
            else
              echo "\"${city}\": {\"temp\":0,\"humidity\":0,\"wind\":0,\"code\":0}" >> "capsules/${DATE_PATH}/global/weather_25_cities.json"
            fi
            FIRST_WEATHER=false
            sleep 0.08
          done
          echo '}' >> "capsules/${DATE_PATH}/global/weather_25_cities.json"
          echo "✅ Weather done ($(jq 'length' capsules/${DATE_PATH}/global/weather_25_cities.json 2>/dev