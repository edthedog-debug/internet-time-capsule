name: Ultra Global Internet Time Capsule

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture-global-memory:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Capture Ultra Global Snapshot
        run: |
          set +e
          
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE_PATH="${YEAR}/${MONTH}/${DAY}"
          
          mkdir -p "capsules/${DATE_PATH}/global"
          mkdir -p "capsules/${DATE_PATH}/countries"
          
          echo "🚀 Starting Ultra Global Capture..."
          
          # GitHub Trending
          echo "📡 Capturing GitHub..."
          curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/search/repositories?q=created:>${YEAR}-${MONTH}-${DAY}&sort=stars&order=desc&per_page=30" | \
            jq '[.items[] | {name: .full_name, stars: .stargazers_count, language: .language, description: .description, url: .html_url}]' \
            > "capsules/${DATE_PATH}/global/github_trending.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/github_trending.json"
          echo "✅ GitHub done"
          
          # HackerNews
          echo "📡 Capturing HackerNews..."
          HN_TOP=$(curl -s "https://hacker-news.firebaseio.com/v0/topstories.json" | jq '.[0:20]' 2>/dev/null || echo '[]')
          echo '[]' > "capsules/${DATE_PATH}/global/hackernews.json"
          for id in $(echo $HN_TOP | jq -r '.[]' 2>/dev/null); do
            ITEM=$(curl -s "https://hacker-news.firebaseio.com/v0/item/${id}.json" 2>/dev/null || echo '{}')
            echo "$ITEM" | jq '{id: .id, title: .title, url: .url, score: .score}' >> "capsules/${DATE_PATH}/global/hackernews.json" 2>/dev/null || true
            sleep 0.05
          done
          if [ -s "capsules/${DATE_PATH}/global/hackernews.json" ]; then
            jq -s '.' "capsules/${DATE_PATH}/global/hackernews.json" > tmp_hn.json 2>/dev/null && mv tmp_hn.json "capsules/${DATE_PATH}/global/hackernews.json" || echo '[]' > "capsules/${DATE_PATH}/global/hackernews.json"
          fi
          echo "✅ HackerNews done"
          
          # StackOverflow
          echo "📡 Capturing StackOverflow..."
          curl -s "https://api.stackexchange.com/2.3/questions?order=desc&sort=hot&site=stackoverflow&pagesize=20" | \
            jq '[.items[] | {title: .title, score: .score, tags: .tags}]' \
            > "capsules/${DATE_PATH}/global/stackoverflow.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/stackoverflow.json"
          echo "✅ StackOverflow done"
          
          # Reddit
          echo "📡 Capturing Reddit..."
          curl -s -H "User-Agent: TimeCapsule/1.0" \
            "https://www.reddit.com/r/all/hot.json?limit=20" | \
            jq '[.data.children[] | {title: .data.title, subreddit: .data.subreddit, score: .data.score}]' \
            > "capsules/${DATE_PATH}/global/reddit.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/reddit.json"
          echo "✅ Reddit done"
          
          # Wikipedia (10 idiomas)
          echo "📡 Capturing Wikipedia..."
          for lang in en es fr de ja zh ar ru pt hi; do
            curl -s "https://${lang}.wikipedia.org/w/api.php?action=query&list=mostviewed&format=json" | \
              jq "{lang: \"${lang}\", articles: [.query.mostviewed[:15] | .[] | {title: .title, views: .views}]}" \
              > "capsules/${DATE_PATH}/global/wikipedia_${lang}.json" 2>/dev/null || echo "{\"lang\":\"${lang}\",\"error\":\"unavailable\"}" > "capsules/${DATE_PATH}/global/wikipedia_${lang}.json"
            sleep 0.2
          done
          echo "✅ Wikipedia done"
          
          # Exchange Rates
          echo "📡 Capturing Exchange Rates..."
          curl -s "https://open.er-api.com/v6/latest/USD" | \
            jq '{base: .base_code, updated: .time_last_update_utc, rates: .rates}' \
            > "capsules/${DATE_PATH}/global/exchange_rates.json" 2>/dev/null || echo '{}' > "capsules/${DATE_PATH}/global/exchange_rates.json"
          echo "✅ Exchange Rates done"
          
          # Crypto
          echo "📡 Capturing Crypto..."
          curl -s "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=30&page=1" | \
            jq '[.[] | {name: .name, symbol: .symbol, price: .current_price, market_cap: .market_cap, change_24h: .price_change_percentage_24h}]' \
            > "capsules/${DATE_PATH}/global/crypto.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/crypto.json"
          echo "✅ Crypto done"
          
          # Weather (25 ciudades)
          echo "📡 Capturing Weather..."
          declare -A CITIES
          CITIES=(
            ["New_York"]="40.7128,-74.0060"
            ["London"]="51.5074,-0.1278"
            ["Tokyo"]="35.6762,139.6503"
            ["Shanghai"]="31.2304,121.4737"
            ["Mumbai"]="19.0760,72.8777"
            ["Sao_Paulo"]="-23.5505,-46.6333"
            ["Lagos"]="6.5244,3.3792"
            ["Cairo"]="30.0444,31.2357"
            ["Mexico_City"]="19.4326,-99.1332"
            ["Paris"]="48.8566,2.3522"
            ["Moscow"]="55.7558,37.6173"
            ["Sydney"]="-33.8688,151.2093"
            ["Dubai"]="25.2048,55.2708"
            ["Singapore"]="1.3521,103.8198"
            ["Toronto"]="43.6532,-79.3832"
            ["Berlin"]="52.5200,13.4050"
            ["Buenos_Aires"]="-34.6037,-58.3816"
            ["Seoul"]="37.5665,126.9780"
            ["Istanbul"]="41.0082,28.9784"
            ["Jakarta"]="-6.2088,106.8456"
            ["Bangkok"]="13.7563,100.5018"
            ["Nairobi"]="-1.2921,36.8219"
            ["Lima"]="-12.0464,-77.0428"
            ["Rome"]="41.9028,12.4964"
            ["Cape_Town"]="-33.9249,18.4241"
          )
          
          echo '{' > "capsules/${DATE_PATH}/global/weather_25_cities.json"
          first=true
          for city in "${!CITIES[@]}"; do
            IFS=',' read -r lat lon <<< "${CITIES[$city]}"
            WEATHER=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=auto" 2>/dev/null || echo '{}')
            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> "capsules/${DATE_PATH}/global/weather_25_cities.json"
            fi
            echo "\"${city}\": $(echo $WEATHER | jq '.current')" >> "capsules/${DATE_PATH}/global/weather_25_cities.json"
            sleep 0.1
          done
          echo '}' >> "capsules/${DATE_PATH}/global/weather_25_cities.json"
          echo "✅ Weather done"
          
          # Air Quality
          echo "📡 Capturing Air Quality..."
          for aq_city in "40.71,-74.01,nyc" "51.51,-0.13,london" "35.68,139.65,tokyo" "28.61,77.23,delhi" "-23.55,-46.63,sao_paulo"; do
            IFS=',' read -r aq_lat aq_lon aq_name <<< "$aq_city"
            curl -s "https://api.open-meteo.com/v1/air-quality?latitude=${aq_lat}&longitude=${aq_lon}&current=pm2_5,pm10,european_aqi&timezone=auto" | \
              jq "{city: \"${aq_name}\", air_quality: .current}" \
              > "capsules/${DATE_PATH}/global/air_quality_${aq_name}.json" 2>/dev/null || echo "{}" > "capsules/${DATE_PATH}/global/air_quality_${aq_name}.json"
            sleep 0.1
          done
          echo "✅ Air Quality done"
          
          # Earthquakes
          echo "📡 Capturing Earthquakes..."
          curl -s "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson" | \
            jq '[.features[] | {place: .properties.place, magnitude: .properties.mag, time: .properties.time, significance: .properties.sig}]' \
            > "capsules/${DATE_PATH}/global/earthquakes.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/earthquakes.json"
          echo "✅ Earthquakes done"
          
          # NASA APOD
          echo "📡 Capturing NASA..."
          curl -s "https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY" | \
            jq '{title: .title, date: .date, url: .url, explanation: .explanation[:300], media_type: .media_type}' \
            > "capsules/${DATE_PATH}/global/nasa_apod.json" 2>/dev/null || echo '{}' > "capsules/${DATE_PATH}/global/nasa_apod.json"
          echo "✅ NASA done"
          
          # ISS Position
          echo "📡 Capturing ISS..."
          curl -s "http://api.open-notify.org/iss-now.json" | \
            jq '{timestamp: .timestamp, lat: .iss_position.latitude, lon: .iss_position.longitude}' \
            > "capsules/${DATE_PATH}/global/iss_position.json" 2>/dev/null || echo '{}' > "capsules/${DATE_PATH}/global/iss_position.json"
          echo "✅ ISS done"
          
          # People in Space
          echo "📡 Capturing Astronauts..."
          curl -s "http://api.open-notify.org/astros.json" | \
            jq '{total: .number, people: [.people[] | {name: .name, craft: .craft}]}' \
            > "capsules/${DATE_PATH}/global/people_in_space.json" 2>/dev/null || echo '{}' > "capsules/${DATE_PATH}/global/people_in_space.json"
          echo "✅ Astronauts done"
          
          # Countries Demographics
          echo "📡 Capturing Countries..."
          curl -s "https://restcountries.com/v3.1/all?fields=name,capital,population,area,region,subregion,flags,timezones" | \
            jq '[.[] | {country: .name.common, capital: .capital[0], population: .population, area_km2: .area, region: .region, subregion: .subregion, flag: .flags.png, timezones: .timezones}]' \
            > "capsules/${DATE_PATH}/global/all_countries.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/all_countries.json"
          echo "✅ Countries done"
          
          # Global Holidays
          echo "📡 Capturing Holidays..."
          curl -s "https://date.nager.at/api/v3/NextPublicHolidaysWorldwide" | \
            jq '[.[:30] | .[] | {date: .date, name: .name, country: .countryCode}]' \
            > "capsules/${DATE_PATH}/global/holidays_today.json" 2>/dev/null || echo '[]' > "capsules/${DATE_PATH}/global/holidays_today.json"
          echo "✅ Holidays done"
          
          # ArXiv Papers
          echo "📡 Capturing ArXiv..."
          curl -s "http://export.arxiv.org/api/query?search_query=all:latest&sortBy=submittedDate&sortOrder=descending&max_results=15" \
            > "capsules/${DATE_PATH}/global/arxiv_latest.xml" 2>/dev/null || echo 'No data' > "capsules/${DATE_PATH}/global/arxiv_latest.xml"
          echo "✅ ArXiv done"
          
          # COVID Global Stats
          echo "📡 Capturing Health Stats..."
          curl -s "https://disease.sh/v3/covid-19/all" | \
            jq '{cases: .cases, deaths: .deaths, recovered: .recovered, updated: .updated}' \
            > "capsules/${DATE_PATH}/global/covid_global.json" 2>/dev/null || echo '{}' > "capsules/${DATE_PATH}/global/covid_global.json"
          echo "✅ Health Stats done"
          
          echo ""
          echo "🎉 ULTRA GLOBAL CAPTURE COMPLETE!"
          echo "📁 Files saved to: capsules/${DATE_PATH}/"
          echo "📊 Generated files:"
          ls -la "capsules/${DATE_PATH}/global/"
          
          set -e

      - name: Generate Ultra Comprehensive Manifest
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          DATE_PATH="${YEAR}/${MONTH}/${DAY}"
          
          cat > "capsules/${DATE_PATH}/README.md" << MANIFESTEOF
          # 🌐 Ultra Global Internet Time Capsule - ${YEAR}-${MONTH}-${DAY}
          
          ## 📊 Complete Daily World Snapshot
          
          ### 🌍 GLOBAL INTERNET
          - ✅ **GitHub**: Top 30 trending repositories
          - ✅ **HackerNews**: Top 20 stories
          - ✅ **StackOverflow**: 20 hottest questions
          - ✅ **Reddit**: r/all front page
          
          ### 📚 KNOWLEDGE
          - ✅ **Wikipedia**: Trending in 10 languages
          - ✅ **ArXiv**: Latest 15 academic papers
          
          ### 💰 FINANCE
          - ✅ **Exchange Rates**: 160+ currencies
          - ✅ **Cryptocurrencies**: Top 30 by market cap
          
          ### 🌤️ ENVIRONMENT
          - ✅ **Weather**: 25 major cities worldwide
          - ✅ **Air Quality**: NYC, London, Tokyo, Delhi, São Paulo
          
          ### 🌋 NATURAL EVENTS
          - ✅ **Earthquakes**: All magnitudes today
          
          ### 🛰️ SPACE
          - ✅ **NASA**: Astronomy Picture of the Day
          - ✅ **ISS**: Current position
          - ✅ **Astronauts**: People in space right now
          
          ### 🌍 WORLD
          - ✅ **Demographics**: All 195 countries
          - ✅ **Holidays**: Today's global observances
          - ✅ **Health**: Global statistics
          
          ---
          *Auto-generated at ${TIMESTAMP} — 100% automated — 100% open data*
          MANIFESTEOF

      - name: Generate Master Index
        run: |
          cat > "capsules/INDEX.md" << 'INDEXEOF'
          # 🌐 The Ultra Global Internet Time Capsule
          
          ## 📦 The Most Complete Open Digital Archive
          
          ### 🌍 Global Coverage
          
          | Category | Sources | Coverage |
          |----------|---------|----------|
          | 💻 Tech | GitHub, HN, Reddit, StackOverflow | Global |
          | 📚 Knowledge | Wikipedia (10 lang), ArXiv | Worldwide |
          | 💰 Finance | Forex (160), Crypto (30) | Worldwide |
          | 🌤️ Climate | 25 cities, Air Quality (5) | 6 continents |
          | 🌋 Nature | USGS Earthquakes | Global |
          | 🛰️ Space | NASA, ISS | Orbital |
          | 🌍 World | 195 countries, Holidays | Complete |
          
          ### 🗂 Browse by Date
          
          $(for year_dir in capsules/*/; do
            year=$(basename "$year_dir")
            if [[ "$year" =~ ^[0-9]{4}$ ]]; then
              echo "- [📁 ${year}](./capsules/${year}/)"
            fi
          done)
          
          ### 🎯 Why This Archive Is Unique
          
          - **100% Open Source** — All data freely accessible
          - **100% Automated** — Runs every 24 hours
          - **100% Free** — No API keys needed
          - **Multi-dimensional** — Tech, finance, science, culture
          - **Immutable History** — Preserved in Git forever
          
          ---
          *Updated daily at 00:00 UTC — Zero cost — Open forever*
          INDEXEOF

      - name: Commit and Push Ultra Capsule
        run: |
          git config --global user.name 'Ultra Time Capsule Bot'
          git config --global user.email 'ultra-capsule@github-actions.bot'
          git pull --rebase origin main
          git add capsules/
          git commit -m "🌐 Ultra Global Capsule: $(date +%Y-%m-%d) - Full world snapshot" || echo "No changes to commit"
          git push origin main