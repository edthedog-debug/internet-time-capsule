name: Daily Internet Time Capsule

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:  # Allows manual trigger

permissions:
  contents: write

jobs:
  capture-internet-memory:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Capture Global Internet Snapshot
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE_PATH="${YEAR}/${MONTH}/${DAY}"
          
          mkdir -p "capsules/${DATE_PATH}"
          
          echo "{
            \"timestamp\": \"${TIMESTAMP}\",
            \"day_of_week\": \"$(date +%A)\",
            \"week_number\": $(date +%V),
            \"captured_at_epoch\": $(date +%s),
            \"data\": {
              \"github_trending\": $(curl -s -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/search/repositories?q=created:>${YEAR}-${MONTH}-${DAY}&sort=stars&order=desc&per_page=20" | \
                jq '[.items[] | {name: .full_name, stars: .stargazers_count, language: .language, description: .description, url: .html_url}]'),
              \"hackernews_top\": $(curl -s "https://hacker-news.firebaseio.com/v0/topstories.json" | \
                jq '.[0:30]' | jq -R -s '{story_ids: .}'),
              \"wikipedia_trending\": $(curl -s "https://en.wikipedia.org/w/api.php?action=query&list=mostviewed&format=json" | \
                jq '[.query.mostviewed[:20] | .[] | {title: .title, views: .views}]'),
              \"global_holidays\": $(curl -s "https://date.nager.at/api/v3/NextPublicHolidaysWorldwide" | \
                jq '[.[:10] | .[] | {date: .date, name: .name, country: .countryCode}]'),
              \"exchange_rates\": $(curl -s "https://open.er-api.com/v6/latest/USD" | \
                jq '{base: .base_code, rates: .rates | to_entries | map(select(.key == "EUR" or .key == "GBP" or .key == "JPY" or .key == "BTC" or .key == "CNY" or .key == "INR" or .key == "BRL")) | from_entries}'),
              \"space_events\": $(curl -s "https://api.nasa.gov/DONKI/notifications?startDate=${YEAR}-${MONTH}-${DAY}&endDate=${YEAR}-${MONTH}-${DAY}&type=all" | \
                jq '[.[:5] | .[] | {type: .messageType, message: .messageBody[:200]}]'),
              \"earthquakes_today\": $(curl -s "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson" | \
                jq '[.features[:10] | .[] | {place: .properties.place, magnitude: .properties.mag, time: .properties.time}]')
            }
          }" > "capsules/${DATE_PATH}/global_snapshot.json"
          
          echo "{
            \"weather_extremes\": $(curl -s "https://api.open-meteo.com/v1/forecast?latitude=0&longitude=0&daily=temperature_2m_max,temperature_2m_min&timezone=UTC&forecast_days=1" | \
              jq '{max_temp_equator: .daily.temperature_2m_max[0], min_temp_equator: .daily.temperature_2m_min[0]}')
          }" > "capsules/${DATE_PATH}/climate_snapshot.json"
          
      - name: Generate Daily Manifest
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          DATE_PATH="${YEAR}/${MONTH}/${DAY}"
          
          echo "# 📅 Internet Time Capsule - ${YEAR}-${MONTH}-${DAY}
          
          ## 🌍 What was captured today
          
          - **GitHub Trending Repos**: Top 20 newly created repositories
          - **HackerNews**: Top 30 stories of the day
          - **Wikipedia**: Most viewed articles globally
          - **Global Holidays**: International observances
          - **Financial Markets**: Exchange rates snapshot
          - **Space Weather**: NASA solar events and notifications
          - **Seismic Activity**: Earthquakes magnitude 2.5+ worldwide
          - **Climate**: Equatorial temperature extremes
          
          ## 📊 Quick Stats
          
          This capsule contains structured data preserving this exact moment in internet history.
          
          ---
          *Auto-generated by the Internet Time Capsule Project - preserving digital history one day at a time*" > "capsules/${DATE_PATH}/README.md"
      
      - name: Generate Index
        run: |
          echo "# 🌐 The Internet Time Capsule
          
          ## 📦 Preserving Internet History Since $(date +%Y)
          
          Every day, this repository automatically captures a snapshot of what's happening across the internet. From trending code to breaking news, from market data to space weather - we're building a free, open-source time machine.
          
          ## 🗂 Browse by Year
          
          $(for year_dir in capsules/*/; do
            year=$(basename "$year_dir")
            if [[ "$year" =~ ^[0-9]{4}$ ]]; then
              echo "- [📁 ${year}](./capsules/${year}/)"
            fi
          done)
          
          ## 🎯 Why This Matters
          
          Internet content disappears. News changes. Trends fade. This project creates immutable, timestamped records of our digital civilization.
          
          ## 📈 Growing Dataset
          
          - **Updates**: Every 24 hours, fully automated
          - **Data Types**: 8+ different internet signals
          - **Format**: Structured JSON, human-readable Markdown
          - **Cost**: $0 - powered entirely by GitHub Actions free tier
          
          ## 🔍 Last 7 Days
          
          $(for i in {0..6}; do
            date_str=$(date -d "$i days ago" +%Y/%m/%d)
            if [ -d "capsules/${date_str}" ]; then
              echo "- [📅 $(date -d "$i days ago" +%Y-%m-%d)](./capsules/${date_str}/)"
            fi
          done)
          
          ---
          *This project runs on GitHub Actions - completely free, completely automatic. The internet's story, preserved forever.*" > "capsules/INDEX.md"
      
      - name: Commit and Push Time Capsule
        run: |
          git config --global user.name 'Time Capsule Bot'
          git config --global user.email 'time-capsule@github-actions.bot'
          git add capsules/
          git commit -m "📦 Time Capsule: $(date +%Y-%m-%d) - Preserving today's internet" || echo "No changes to commit"
          git push