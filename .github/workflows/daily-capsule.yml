name: Ultra Global Internet Time Capsule

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture-global-memory:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Capture Ultra Global Snapshot
        run: |
          set +e
          
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE_PATH="${YEAR}/${MONTH}/${DAY}"
          
          mkdir -p "capsules/${DATE_PATH}/global"
          mkdir -p "capsules/${DATE_PATH}/countries"
          
          echo "🚀 Starting Ultra Global Capture..."
          
          # ============================================
          # GITHUB TRENDING
          # ============================================
          echo "📡 Capturing GitHub..."
          GITHUB_DATA=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/search/repositories?q=stars:>100&sort=stars&order=desc&per_page=30" 2>/dev/null)
          if echo "$GITHUB_DATA" | jq -e '.items' > /dev/null 2>&1; then
            echo "$GITHUB_DATA" | jq '[.items[] | {name: .full_name, stars: .stargazers_count, language: (.language // "Unknown"), description: (.description // ""), url: .html_url, topics: (.topics // [])}]' \
              > "capsules/${DATE_PATH}/global/github_trending.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/github_trending.json"
          fi
          echo "✅ GitHub done ($(jq 'length' capsules/${DATE_PATH}/global/github_trending.json 2>/dev/null || echo 0) repos)"

          # ============================================
          # HACKER NEWS
          # ============================================
          echo "📡 Capturing HackerNews..."
          HN_TOP=$(curl -s "https://hacker-news.firebaseio.com/v0/topstories.json" 2>/dev/null | jq '.[0:20]' 2>/dev/null)
          if [ -n "$HN_TOP" ] && [ "$HN_TOP" != "null" ]; then
            echo '[' > "capsules/${DATE_PATH}/global/hackernews.json"
            FIRST_HN=true
            for id in $(echo "$HN_TOP" | jq -r '.[]' 2>/dev/null); do
              HN_ITEM=$(curl -s "https://hacker-news.firebaseio.com/v0/item/${id}.json" 2>/dev/null)
              if [ -n "$HN_ITEM" ] && [ "$HN_ITEM" != "null" ]; then
                if [ "$FIRST_HN" = false ]; then echo ',' >> "capsules/${DATE_PATH}/global/hackernews.json"; fi
                echo "$HN_ITEM" | jq '{id: (.id // 0), title: (.title // "Untitled"), url: (.url // ""), score: (.score // 0), by: (.by // "unknown"), comments: (.descendants // 0)}' >> "capsules/${DATE_PATH}/global/hackernews.json"
                FIRST_HN=false
              fi
              sleep 0.03
            done
            echo ']' >> "capsules/${DATE_PATH}/global/hackernews.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/hackernews.json"
          fi
          echo "✅ HackerNews done ($(jq 'length' capsules/${DATE_PATH}/global/hackernews.json 2>/dev/null || echo 0) stories)"

          # ============================================
          # STACKOVERFLOW
          # ============================================
          echo "📡 Capturing StackOverflow..."
          SO_DATA=$(curl -s "https://api.stackexchange.com/2.3/questions?order=desc&sort=hot&site=stackoverflow&pagesize=20" 2>/dev/null)
          if echo "$SO_DATA" | jq -e '.items' > /dev/null 2>&1; then
            echo "$SO_DATA" | jq '[.items[] | {title: (.title // "Untitled"), score: (.score // 0), views: (.view_count // 0), answers: (.answer_count // 0), tags: (.tags // []), link: (.link // "")}]' \
              > "capsules/${DATE_PATH}/global/stackoverflow.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/stackoverflow.json"
          fi
          echo "✅ StackOverflow done ($(jq 'length' capsules/${DATE_PATH}/global/stackoverflow.json 2>/dev/null || echo 0) questions)"

          # ============================================
          # REDDIT
          # ============================================
          echo "📡 Capturing Reddit..."
          REDDIT_DATA=$(curl -s -H "User-Agent: TimeCapsule/1.0" \
            "https://www.reddit.com/r/all/hot.json?limit=20&raw_json=1" 2>/dev/null)
          if echo "$REDDIT_DATA" | jq -e '.data.children' > /dev/null 2>&1; then
            echo "$REDDIT_DATA" | jq '[.data.children[] | {title: (.data.title // "Untitled"), subreddit: (.data.subreddit // "unknown"), score: (.data.score // 0), comments: (.data.num_comments // 0), url: (.data.url // ""), author: (.data.author // "unknown")}]' \
              > "capsules/${DATE_PATH}/global/reddit.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/reddit.json"
          fi
          echo "✅ Reddit done ($(jq 'length' capsules/${DATE_PATH}/global/reddit.json 2>/dev/null || echo 0) posts)"

          # ============================================
          # WIKIPEDIA (15 languages)
          # ============================================
          echo "📡 Capturing Wikipedia..."
          for lang in en es fr de ja zh ar ru pt hi it nl pl sv ko; do
            WIKI_DATA=$(curl -s "https://${lang}.wikipedia.org/w/api.php?action=query&list=mostviewed&format=json&pvimlimit=15" 2>/dev/null)
            if echo "$WIKI_DATA" | jq -e '.query.mostviewed' > /dev/null 2>&1; then
              echo "$WIKI_DATA" | jq "{lang: \"${lang}\", articles: [.query.mostviewed[] | {title: (.title // \"Unknown\"), views: (.views // 0)}]}" \
                > "capsules/${DATE_PATH}/global/wikipedia_${lang}.json"
            else
              echo "{\"lang\":\"${lang}\",\"articles\":[]}" > "capsules/${DATE_PATH}/global/wikipedia_${lang}.json"
            fi
            sleep 0.15
          done
          echo "✅ Wikipedia done (15 languages)"

          # ============================================
          # EXCHANGE RATES
          # ============================================
          echo "📡 Capturing Exchange Rates..."
          FOREX_DATA=$(curl -s "https://open.er-api.com/v6/latest/USD" 2>/dev/null)
          if echo "$FOREX_DATA" | jq -e '.rates' > /dev/null 2>&1; then
            echo "$FOREX_DATA" | jq '{base: (.base_code // "USD"), updated: (.time_last_update_utc // "unknown"), rates: (.rates // {})}' \
              > "capsules/${DATE_PATH}/global/exchange_rates.json"
          else
            echo '{"base":"USD","rates":{},"updated":"unavailable"}' > "capsules/${DATE_PATH}/global/exchange_rates.json"
          fi
          echo "✅ Exchange Rates done ($(jq '.rates | length' capsules/${DATE_PATH}/global/exchange_rates.json 2>/dev/null || echo 0) currencies)"

          # ============================================
          # CRYPTO (CoinGecko)
          # ============================================
          echo "📡 Capturing Crypto..."
          CRYPTO_DATA=$(curl -s "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=30&page=1&sparkline=false" 2>/dev/null)
          if echo "$CRYPTO_DATA" | jq -e '.[0].id' > /dev/null 2>&1; then
            echo "$CRYPTO_DATA" | jq '[.[] | {name: (.name // "Unknown"), symbol: (.symbol // "???"), price: (.current_price // 0), market_cap: (.market_cap // 0), volume_24h: (.total_volume // 0), change_24h: (.price_change_percentage_24h // 0), market_cap_rank: (.market_cap_rank // 0)}]' \
              > "capsules/${DATE_PATH}/global/crypto.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/crypto.json"
          fi
          echo "✅ Crypto done ($(jq 'length' capsules/${DATE_PATH}/global/crypto.json 2>/dev/null || echo 0) coins)"

          # ============================================
          # STOCK MARKETS (fixed null previous_close)
          # ============================================
          echo "📡 Capturing Stock Markets..."
          
          echo '{"indices":[]}' > "capsules/${DATE_PATH}/global/stock_markets.json"
          
          declare -A STOCKS
          STOCKS["%5EGSPC"]="S&P 500|US"
          STOCKS["%5EDJI"]="Dow Jones|US"
          STOCKS["%5EIXIC"]="NASDAQ|US"
          STOCKS["%5EFTSE"]="FTSE 100|Europe"
          STOCKS["%5EGDAXI"]="DAX|Europe"
          STOCKS["%5EFCHI"]="CAC 40|Europe"
          STOCKS["%5EN225"]="Nikkei 225|Asia"
          STOCKS["%5EHSI"]="Hang Seng|Asia"
          STOCKS["%5EBSESN"]="BSE Sensex|Asia"
          STOCKS["%5EAXJO"]="ASX 200|Asia"
          STOCKS["%5EMXX"]="IPC Mexico|Latin America"
          STOCKS["%5EBVSP"]="Bovespa|Latin America"
          
          for symbol in "${!STOCKS[@]}"; do
            IFS='|' read -r name market <<< "${STOCKS[$symbol]}"
            RAW_SYMBOL=$(echo "$symbol" | sed 's/%5E/^/g')
            
            STOCK_RESPONSE=$(curl -s -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              "https://query1.finance.yahoo.com/v8/finance/chart/${RAW_SYMBOL}?interval=1d&range=2d" 2>/dev/null)
            
            if echo "$STOCK_RESPONSE" | jq -e '.chart.result[0].meta' > /dev/null 2>&1; then
              STOCK_JSON=$(echo "$STOCK_RESPONSE" | jq -c "{
                symbol: \"${RAW_SYMBOL}\",
                name: \"${name}\",
                market: \"${market}\",
                price: (.chart.result[0].meta.regularMarketPrice // 0),
                previous_close: (.chart.result[0].meta.previousClose // .chart.result[0].meta.regularMarketPrice // 0),
                change: ((.chart.result[0].meta.regularMarketPrice // 0) - (.chart.result[0].meta.previousClose // .chart.result[0].meta.regularMarketPrice // 0)),
                change_pct: (((.chart.result[0].meta.regularMarketPrice // 0) - (.chart.result[0].meta.previousClose // .chart.result[0].meta.regularMarketPrice // 0)) / (.chart.result[0].meta.previousClose // .chart.result[0].meta.regularMarketPrice // 1) * 100)
              }")
              
              jq ".indices += [${STOCK_JSON}]" "capsules/${DATE_PATH}/global/stock_markets.json" > tmp_stocks.json && mv tmp_stocks.json "capsules/${DATE_PATH}/global/stock_markets.json"
              echo "  ✅ ${name} (${market})"
            else
              echo "  ⚠️ ${name} unavailable"
            fi
            sleep 0.5
          done
          
          STOCK_COUNT=$(jq '.indices | length' "capsules/${DATE_PATH}/global/stock_markets.json" 2>/dev/null || echo 0)
          echo "✅ Stock Markets done (${STOCK_COUNT} indices)"

          # ============================================
          # SPORTS
          # ============================================
          echo "📡 Capturing Sports Data..."
          
          for sport in "basketball/nba:sports_nba" "soccer/eng.1:sports_premier_league" "soccer/esp.1:sports_la_liga" "baseball/mlb:sports_mlb"; do
            IFS=':' read -r path file <<< "$sport"
            SDATA=$(curl -s "https://site.api.espn.com/apis/site/v2/sports/${path}/scoreboard" 2>/dev/null)
            if echo "$SDATA" | jq -e '.events' > /dev/null 2>&1; then
              echo "$SDATA" | jq '[.events[] | {home: .competitions[0].competitors[0].team.displayName, away: .competitions[0].competitors[1].team.displayName, home_score: .competitions[0].competitors[0].score, away_score: .competitions[0].competitors[1].score, status: .status.type.name, date: .date}]' \
                > "capsules/${DATE_PATH}/global/${file}.json"
            else
              echo '[]' > "capsules/${DATE_PATH}/global/${file}.json"
            fi
          done
          
          # F1
          F1_DATA=$(curl -s "https://ergast.com/api/f1/current/last/results.json" 2>/dev/null)
          if echo "$F1_DATA" | jq -e '.MRData.RaceTable.Races' > /dev/null 2>&1; then
            echo "$F1_DATA" | jq '[.MRData.RaceTable.Races[] | {race: .raceName, circuit: .Circuit.circuitName, date: .date, results: [.Results[] | {position: .position, driver: "\(.Driver.givenName) \(.Driver.familyName)", constructor: .Constructor.name}]}]' \
              > "capsules/${DATE_PATH}/global/sports_f1.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/sports_f1.json"
          fi
          
          echo "✅ Sports done"

          # ============================================
          # NEWS (simplified to avoid broken pipe)
          # ============================================
          echo "📡 Capturing News Headlines..."
          
          declare -A NEWS_SOURCES
          NEWS_SOURCES["us"]="en-US&gl=US&ceid=US:en"
          NEWS_SOURCES["china"]="zh-CN&gl=CN&ceid=CN:zh-Hans"
          NEWS_SOURCES["uk"]="en-GB&gl=GB&ceid=GB:en"
          NEWS_SOURCES["india"]="en-IN&gl=IN&ceid=IN:en"
          NEWS_SOURCES["brazil"]="pt-BR&gl=BR&ceid=BR:pt"
          
          for country in "${!NEWS_SOURCES[@]}"; do
            NEWS_XML=$(curl -s "https://news.google.com/rss?hl=${NEWS_SOURCES[$country]}" 2>/dev/null)
            echo "$NEWS_XML" | grep -oP '<item>.*?</item>' | head -15 | while read -r item; do
              title=$(echo "$item" | grep -oP '<title>.*?</title>' | sed 's/<[^>]*>//g' | head -1 | sed 's/"/\\"/g; s/&/\\&/g')
              link=$(echo "$item" | grep -oP '<link>.*?</link>' | sed 's/<[^>]*>//g' | head -1)
              echo "{\"title\":\"$title\",\"link\":\"$link\",\"country\":\"$country\"}"
            done | jq -s '.' > "capsules/${DATE_PATH}/global/news_${country}.json" 2>/dev/null
            if [ ! -s "capsules/${DATE_PATH}/global/news_${country}.json" ]; then
              echo '[]' > "capsules/${DATE_PATH}/global/news_${country}.json"
            fi
          done
          
          echo "✅ News done (5 countries)"

          # ============================================
          # WEATHER (25 cities)
          # ============================================
          echo "📡 Capturing Weather..."
          declare -A CITIES
          CITIES=(
            ["New_York"]="40.7128,-74.0060"
            ["London"]="51.5074,-0.1278"
            ["Tokyo"]="35.6762,139.6503"
            ["Shanghai"]="31.2304,121.4737"
            ["Mumbai"]="19.0760,72.8777"
            ["Sao_Paulo"]="-23.5505,-46.6333"
            ["Lagos"]="6.5244,3.3792"
            ["Cairo"]="30.0444,31.2357"
            ["Mexico_City"]="19.4326,-99.1332"
            ["Paris"]="48.8566,2.3522"
            ["Moscow"]="55.7558,37.6173"
            ["Sydney"]="-33.8688,151.2093"
            ["Dubai"]="25.2048,55.2708"
            ["Singapore"]="1.3521,103.8198"
            ["Toronto"]="43.6532,-79.3832"
            ["Berlin"]="52.5200,13.4050"
            ["Buenos_Aires"]="-34.6037,-58.3816"
            ["Seoul"]="37.5665,126.9780"
            ["Istanbul"]="41.0082,28.9784"
            ["Jakarta"]="-6.2088,106.8456"
            ["Bangkok"]="13.7563,100.5018"
            ["Nairobi"]="-1.2921,36.8219"
            ["Lima"]="-12.0464,-77.0428"
            ["Rome"]="41.9028,12.4964"
            ["Cape_Town"]="-33.9249,18.4241"
          )
          
          echo '{' > "capsules/${DATE_PATH}/global/weather_25_cities.json"
          FIRST_WEATHER=true
          for city in "${!CITIES[@]}"; do
            IFS=',' read -r lat lon <<< "${CITIES[$city]}"
            W_DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=auto" 2>/dev/null)
            if [ "$FIRST_WEATHER" = false ]; then echo ',' >> "capsules/${DATE_PATH}/global/weather_25_cities.json"; fi
            if echo "$W_DATA" | jq -e '.current' > /dev/null 2>&1; then
              echo "\"${city}\": $(echo "$W_DATA" | jq '.current | {temp: (.temperature_2m // 0), humidity: (.relative_humidity_2m // 0), wind: (.wind_speed_10m // 0), code: (.weather_code // 0)}')" >> "capsules/${DATE_PATH}/global/weather_25_cities.json"
            else
              echo "\"${city}\": {\"temp\":0,\"humidity\":0,\"wind\":0,\"code\":0}" >> "capsules/${DATE_PATH}/global/weather_25_cities.json"
            fi
            FIRST_WEATHER=false
            sleep 0.08
          done
          echo '}' >> "capsules/${DATE_PATH}/global/weather_25_cities.json"
          echo "✅ Weather done ($(jq 'length' capsules/${DATE_PATH}/global/weather_25_cities.json 2>/dev/null || echo 0) cities)"

          # ============================================
          # AIR QUALITY
          # ============================================
          echo "📡 Capturing Air Quality..."
          for aq in "40.71,-74.01,nyc" "51.51,-0.13,london" "35.68,139.65,tokyo" "28.61,77.23,delhi" "-23.55,-46.63,sao_paulo"; do
            IFS=',' read -r aq_lat aq_lon aq_name <<< "$aq"
            AQ_DATA=$(curl -s "https://api.open-meteo.com/v1/air-quality?latitude=${aq_lat}&longitude=${aq_lon}&current=pm2_5,pm10,european_aqi&timezone=auto" 2>/dev/null)
            if echo "$AQ_DATA" | jq -e '.current' > /dev/null 2>&1; then
              echo "$AQ_DATA" | jq "{city: \"${aq_name}\", aqi: (.current.european_aqi // 0), pm25: (.current.pm2_5 // 0), pm10: (.current.pm10 // 0)}" \
                > "capsules/${DATE_PATH}/global/air_quality_${aq_name}.json"
            else
              echo "{\"city\":\"${aq_name}\",\"aqi\":0,\"pm25\":0,\"pm10\":0}" > "capsules/${DATE_PATH}/global/air_quality_${aq_name}.json"
            fi
            sleep 0.08
          done
          echo "✅ Air Quality done"

          # ============================================
          # EARTHQUAKES
          # ============================================
          echo "📡 Capturing Earthquakes..."
          QUAKE_DATA=$(curl -s "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson" 2>/dev/null)
          if echo "$QUAKE_DATA" | jq -e '.features' > /dev/null 2>&1; then
            echo "$QUAKE_DATA" | jq '[.features[] | {place: (.properties.place // "Unknown"), magnitude: (.properties.mag // 0), time: (.properties.time // 0), depth: (.geometry.coordinates[2] // 0), significance: (.properties.sig // 0), alert: (.properties.alert // "none")}]' \
              > "capsules/${DATE_PATH}/global/earthquakes.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/earthquakes.json"
          fi
          echo "✅ Earthquakes done ($(jq 'length' capsules/${DATE_PATH}/global/earthquakes.json 2>/dev/null || echo 0) events)"

          # ============================================
          # NASA APOD
          # ============================================
          echo "📡 Capturing NASA..."
          NASA_DATA=$(curl -s "https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY" 2>/dev/null)
          if echo "$NASA_DATA" | jq -e '.url' > /dev/null 2>&1; then
            echo "$NASA_DATA" | jq '{title: (.title // "APOD"), date: (.date // ""), url: (.url // ""), explanation: (.explanation // "")[0:500], media_type: (.media_type // "image")}' \
              > "capsules/${DATE_PATH}/global/nasa_apod.json"
          else
            echo '{"title":"NASA APOD unavailable","url":"","explanation":"NASA API rate limit reached."}' > "capsules/${DATE_PATH}/global/nasa_apod.json"
          fi
          echo "✅ NASA done"

          # ============================================
          # ISS POSITION
          # ============================================
          echo "📡 Capturing ISS..."
          ISS_DATA=$(curl -s --connect-timeout 5 "http://api.open-notify.org/iss-now.json" 2>/dev/null)
          if echo "$ISS_DATA" | jq -e '.iss_position' > /dev/null 2>&1; then
            echo "$ISS_DATA" | jq '{timestamp: (.timestamp // 0), lat: (.iss_position.latitude // "0"), lon: (.iss_position.longitude // "0")}' \
              > "capsules/${DATE_PATH}/global/iss_position.json"
          else
            echo '{"timestamp":0,"lat":"0","lon":"0"}' > "capsules/${DATE_PATH}/global/iss_position.json"
          fi
          echo "✅ ISS done"

          # ============================================
          # PEOPLE IN SPACE
          # ============================================
          echo "📡 Capturing Astronauts..."
          ASTRO_DATA=$(curl -s --connect-timeout 5 "http://api.open-notify.org/astros.json" 2>/dev/null)
          if echo "$ASTRO_DATA" | jq -e '.people' > /dev/null 2>&1; then
            echo "$ASTRO_DATA" | jq '{total: (.number // 0), people: [.people[] | {name: (.name // "Unknown"), craft: (.craft // "Unknown")}]}' \
              > "capsules/${DATE_PATH}/global/people_in_space.json"
          else
            echo '{"total":0,"people":[]}' > "capsules/${DATE_PATH}/global/people_in_space.json"
          fi
          echo "✅ Astronauts done"

          # ============================================
          # COUNTRIES DEMOGRAPHICS
          # ============================================
          echo "📡 Capturing Countries..."
          COUNTRIES_DATA=$(curl -s "https://restcountries.com/v3.1/all?fields=name,capital,population,area,region,subregion,flags,timezones" 2>/dev/null)
          if echo "$COUNTRIES_DATA" | jq -e '.[0].name' > /dev/null 2>&1; then
            echo "$COUNTRIES_DATA" | jq '[.[] | {country: (.name.common // "Unknown"), capital: (.capital[0] // "N/A"), population: (.population // 0), area_km2: (.area // 0), region: (.region // "Unknown"), subregion: (.subregion // ""), flag: (.flags.png // ""), timezones: (.timezones // [])}]' \
              > "capsules/${DATE_PATH}/global/all_countries.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/all_countries.json"
          fi
          echo "✅ Countries done ($(jq 'length' capsules/${DATE_PATH}/global/all_countries.json 2>/dev/null || echo 0) countries)"

          # ============================================
          # HOLIDAYS
          # ============================================
          echo "📡 Capturing Holidays..."
          HOLIDAYS_DATA=$(curl -s "https://date.nager.at/api/v3/NextPublicHolidaysWorldwide" 2>/dev/null)
          if echo "$HOLIDAYS_DATA" | jq -e '.[0].date' > /dev/null 2>&1; then
            echo "$HOLIDAYS_DATA" | jq '[.[:30] | .[] | {date: (.date // ""), name: (.name // "Unknown"), country: (.countryCode // "??")}]' \
              > "capsules/${DATE_PATH}/global/holidays_today.json"
          else
            echo '[]' > "capsules/${DATE_PATH}/global/holidays_today.json"
          fi
          echo "✅ Holidays done ($(jq 'length' capsules/${DATE_PATH}/global/holidays_today.json 2>/dev/null || echo 0) holidays)"

          # ============================================
          # COVID STATS
          # ============================================
          echo "📡 Capturing Health Stats..."
          COVID_DATA=$(curl -s "https://disease.sh/v3/covid-19/all" 2>/dev/null)
          if echo "$COVID_DATA" | jq -e '.cases' > /dev/null 2>&1; then
            echo "$COVID_DATA" | jq '{cases: (.cases // 0), deaths: (.deaths // 0), recovered: (.recovered // 0), active: (.active // 0), updated: (.updated // 0)}' \
              > "capsules/${DATE_PATH}/global/covid_global.json"
          else
            echo '{"cases":0,"deaths":0,"recovered":0,"active":0,"updated":0}' > "capsules/${DATE_PATH}/global/covid_global.json"
          fi
          echo "✅ Health Stats done"

          echo ""
          echo "🎉 ULTRA GLOBAL CAPTURE COMPLETE!"
          echo "📁 Files saved to: capsules/${DATE_PATH}/"
          echo "📊 Generated files:"
          ls -la "capsules/${DATE_PATH}/global/"
          
          set -e

      - name: Generate Ultra Comprehensive Manifest
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          DATE_PATH="${YEAR}/${MONTH}/${DAY}"
          
          cat > "capsules/${DATE_PATH}/README.md" << MANIFESTEOF
          # 🌐 Ultra Global Internet Time Capsule - ${YEAR}-${MONTH}-${DAY}
          
          ## 📊 Complete Daily World Snapshot
          
          ### 🌍 GLOBAL INTERNET
          - ✅ **GitHub**: Top 30 trending repositories
          - ✅ **HackerNews**: Top 20 stories
          - ✅ **StackOverflow**: 20 hottest questions
          - ✅ **Reddit**: r/all front page
          
          ### 📚 KNOWLEDGE
          - ✅ **Wikipedia**: Trending in 15 languages
          
          ### 💰 FINANCE
          - ✅ **Exchange Rates**: 160+ currencies
