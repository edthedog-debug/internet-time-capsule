name: Deploy Passive API Endpoint

on:
  push:
    paths:
      - 'capsules/**'
  workflow_dispatch:

jobs:
  generate-api-endpoints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate API Documentation Page
        run: |
          cat > api/index.html << 'APIEOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Time Capsule API - Historical Internet Data</title>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: 'Segoe UI', system-ui; background: #0a0e27; color: #e0e0ff; padding: 20px; }
                  .container { max-width: 900px; margin: 0 auto; }
                  h1 { color: #7b68ee; font-size: 2.5em; margin: 30px 0; }
                  .pricing-box { background: #131842; border-radius: 15px; padding: 30px; margin: 20px 0; border: 1px solid #2a2f5e; }
                  .price { font-size: 3em; color: #4ade80; }
                  .cta { background: #7b68ee; color: white; padding: 15px 30px; border-radius: 8px; text-decoration: none; display: inline-block; margin: 20px 0; }
                  .endpoint { background: #0d1137; padding: 15px; border-radius: 8px; margin: 10px 0; font-family: monospace; }
                  .badge { background: #4ade80; color: #000; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🌐 Internet Time Capsule API</h1>
                  <p>The world's only historical dataset of daily internet trends, captured since 2026.</p>
                  
                  <div class="pricing-box">
                      <h2>🚀 Early Adopter Access</h2>
                      <div class="price">$49<span style="font-size:0.4em">/month</span></div>
                      <p>✓ Full API access to entire historical dataset</p>
                      <p>✓ 10,000 requests/month</p>
                      <p>✓ JSON & CSV exports</p>
                      <p>✓ Bulk download access</p>
                      <p>✓ Early adopter lifetime price lock</p>
                      <a href="https://buy.stripe.com/early-access" class="cta">Get API Key Instantly</a>
                  </div>
                  
                  <div class="pricing-box">
                      <h2>🏢 Enterprise / Research</h2>
                      <div class="price">$299<span style="font-size:0.4em">/month</span></div>
                      <p>✓ Everything in Early Access</p>
                      <p>✓ Unlimited requests</p>
                      <p>✓ Raw data dumps</p>
                      <p>✓ Custom date range exports</p>
                      <p>✓ SLA & support</p>
                      <a href="https://buy.stripe.com/enterprise" class="cta">Contact Sales</a>
                  </div>
                  
                  <h3>📡 Available Endpoints</h3>
                  <div class="endpoint">GET /api/v1/snapshot/{date} <span class="badge">Active</span></div>
                  <div class="endpoint">GET /api/v1/trending/github/{date} <span class="badge">Active</span></div>
                  <div class="endpoint">GET /api/v1/trending/hackernews/{date} <span class="badge">Active</span></div>
                  <div class="endpoint">GET /api/v1/bulk/export?from={date}&to={date} <span class="badge">Premium</span></div>
              </div>
          </body>
          </html>
          APIEOF
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./api