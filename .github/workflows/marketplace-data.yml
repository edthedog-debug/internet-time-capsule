name: Generate Sellable Data Products

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday
  workflow_dispatch:

jobs:
  create-data-products:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Weekly Data Pack
        run: |
          mkdir -p marketplace/weekly-packs
          
          echo "# 📦 Internet Time Capsule - Premium Weekly Pack
          
          ## What's Inside
          
          - **7 days** of complete internet snapshots
          - **Clean CSV** files ready for analysis
          - **JSON** structured data for developers
          - **Trend analysis** of the week
          
          ## Perfect For
          
          - 📊 Data scientists training AI models
          - 📈 Market researchers tracking trends
          - 🎓 Academic researchers
          - 🤖 Building predictive algorithms
          
          ---
          **Get lifetime access**: https://gumroad.com/l/internet-capsule-premium
          **Custom enterprise data**: sales@internetcapsule.dev
          " > marketplace/README.md
          
      - name: Commit Marketplace
        run: |
          git config --global user.name 'Marketplace Bot'
          git config --global user.email 'marketplace@github-actions.bot'
          git add marketplace/
          git commit -m "📦 Weekly data pack generated" || echo "No changes"
          git push