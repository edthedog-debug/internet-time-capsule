<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Time Capsule</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --border: #1c1c1c;
            --text: #ffffff;
            --text2: #98989d;
            --accent: #0a84ff;
            --green: #30d158;
            --red: #ff453a;
            --orange: #ff9f0a;
            --purple: #bf5af2;
            --pink: #ff375f;
            --radius: 28px;
            --radius-sm: 16px;
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font); 
            background: var(--bg); 
            color: var(--text); 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.01em;
        }
        body::before {
            content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(10,132,255,0.025) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 60%, rgba(191,90,242,0.02) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(255,55,95,0.015) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }
        
        /* Hero */
        .hero { 
            text-align: center; padding: 60px 20px 20px; 
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .hero h1 { 
            font-size: clamp(2.4rem, 6vw, 4.2rem); font-weight: 200; 
            letter-spacing: -2px; line-height: 1;
        }
        .hero h1 span { 
            font-weight: 700; 
            background: linear-gradient(135deg, #0a84ff 0%, #bf5af2 50%, #ff375f 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p { color: var(--text2); font-size: 1.05rem; font-weight: 350; max-width: 500px; }
        .hero .live-dot { 
            display: inline-flex; align-items: center; gap: 7px; 
            font-size: 0.75rem; font-weight: 500; color: var(--green);
            background: rgba(48,209,88,0.08); padding: 5px 14px; border-radius: 100px;
            letter-spacing: 0.02em;
        }
        .hero .live-dot::before { 
            content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }
        
        /* Controls bar */
        .controls-bar {
            display: flex; justify-content: center; align-items: center; gap: 10px;
            padding: 20px 0 32px; flex-wrap: wrap;
        }
        .controls-bar input[type="date"], .controls-bar button, .controls-bar a {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 11px 20px; border-radius: 100px; font-size: 0.85rem;
            font-family: var(--font); cursor: pointer; text-decoration: none;
            transition: all 0.2s ease; font-weight: 450; letter-spacing: 0.01em;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .controls-bar input[type="date"] { min-width: 150px; outline: none; }
        .controls-bar input[type="date"]:focus { border-color: var(--accent); }
        .controls-bar button:hover, .controls-bar a:hover { border-color: #ffffff30; background: #111; }
        .controls-bar button.accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
        .controls-bar button.accent:hover { background: #0077ed; }
        .controls-bar a.donate { 
            background: rgba(255,159,10,0.08); border-color: rgba(255,159,10,0.2); color: var(--orange); 
            font-weight: 500; margin-left: 4px;
        }
        .controls-bar a.donate:hover { background: rgba(255,159,10,0.15); border-color: var(--orange); }
        
        #statusMessage { text-align: center; font-size: 0.8rem; min-height: 20px; margin-bottom: 8px; font-weight: 450; }
        
        /* Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        
        /* Card */
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 26px 28px;
            transition: border-color 0.3s ease;
            position: relative; overflow: hidden;
        }
        .card:hover { border-color: #ffffff10; }
        .card-header { 
            display: flex; align-items: center; gap: 14px; margin-bottom: 18px;
        }
        .card-icon { font-size: 1.7rem; line-height: 1; }
        .card-info { flex: 1; }
        .card-title { font-size: 0.95rem; font-weight: 600; letter-spacing: -0.2px; }
        .card-subtitle { font-size: 0.72rem; color: var(--text2); margin-top: 2px; font-weight: 400; }
        .card-badge { 
            font-size: 0.6rem; padding: 4px 10px; border-radius: 100px; 
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
            white-space: nowrap;
        }
        .badge-tech { background: rgba(10,132,255,0.1); color: var(--accent); }
        .badge-finance { background: rgba(48,209,88,0.1); color: var(--green); }
        .badge-nature { background: rgba(255,159,10,0.1); color: var(--orange); }
        .badge-space { background: rgba(191,90,242,0.1); color: var(--purple); }
        .badge-world { background: rgba(255,55,95,0.1); color: var(--pink); }
        
        .chart-area { height: 200px; margin-bottom: 14px; position: relative; }
        .chart-area canvas { width: 100% !important; height: 100% !important; }
        
        /* Table */
        .tbl { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        .tbl th { text-align: left; padding: 7px 6px; border-bottom: 1px solid var(--border); color: var(--text2); font-weight: 500; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .tbl td { padding: 7px 6px; border-bottom: 1px solid #ffffff04; }
        .tbl tr:last-child td { border-bottom: none; }
        .tbl .num { text-align: right; font-variant-numeric: tabular-nums; font-family: 'SF Mono','Fira Code',monospace; font-size: 0.75rem; }
        .tbl a { color: var(--text); text-decoration: none; transition: color 0.2s; }
        .tbl a:hover { color: var(--accent); }
        
        /* Intertemporal */
        .intertemporal {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px 32px; margin-bottom: 24px;
        }
        .intertemporal h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.3px; }
        .intertemporal .subtitle { color: var(--text2); font-size: 0.78rem; margin-bottom: 18px; }
        .it-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
        .it-controls select, .it-controls input {
            background: #111; border: 1px solid var(--border); color: var(--text);
            padding: 10px 16px; border-radius: 100px; font-size: 0.82rem;
            font-family: var(--font); outline: none; cursor: pointer;
        }
        .it-controls select:focus, .it-controls input:focus { border-color: var(--accent); }
        .it-controls button {
            background: var(--accent); border: none; color: #fff;
            padding: 10px 22px; border-radius: 100px; font-size: 0.82rem;
            font-family: var(--font); font-weight: 500; cursor: pointer;
        }
        .it-chart-wrap { height: 340px; position: relative; }
        .it-chart-wrap canvas { width: 100% !important; height: 100% !important; }
        #itStatus { text-align: center; margin-top: 8px; font-size: 0.78rem; }
        
        /* Full-width */
        .full-width { grid-column: 1 / -1; }
        
        /* Tags */
        .tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: #ffffff05; padding: 5px 13px; border-radius: 100px; font-size: 0.76rem; font-weight: 450; }
        
        /* APOD */
        .apod-img { width: 100%; border-radius: var(--radius-sm); margin-bottom: 10px; }
        .apod-txt { font-size: 0.8rem; color: var(--text2); line-height: 1.5; }
        
        /* Loading */
        .loading-wrap { display: flex; flex-direction: column; align-items: center; padding: 60px; grid-column: 1/-1; }
        .loader { width: 26px; height: 26px; border: 2px solid #ffffff10; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-state { grid-column: 1/-1; text-align: center; padding: 40px; background: rgba(255,69,58,0.04); border: 1px solid rgba(255,69,58,0.15); border-radius: var(--radius); }
        .error-state a { color: var(--accent); }
        
        ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #ffffff10; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero -->
        <div class="hero">
            <h1>Internet <span>Time Capsule</span></h1>
            <p>A daily snapshot of human digital civilization.</p>
            <span class="live-dot">Live · Updated every 24h at 00:00 UTC</span>
        </div>
        
        <!-- Controls -->
        <div class="controls-bar">
            <input type="date" id="datePicker">
            <button class="accent" onclick="loadSelectedDate()">Load Date</button>
            <button onclick="loadToday()">Today</button>
            <a href="https://github.com/sponsors/edthedog-debug" target="_blank" class="donate">♥ Sponsor</a>
        </div>
        <div id="statusMessage"></div>
        
        <!-- Intertemporal -->
        <div class="intertemporal">
            <h2>📈 Temporal Analysis</h2>
            <p class="subtitle">Track a single metric over time. Select category, item, and date range.</p>
            <div class="it-controls">
                <select id="itCategory" onchange="updateITItems()">
                    <option value="">— Category —</option>
                    <option value="weather">🌤️ Temperature</option>
                    <option value="air_quality">🌬️ Air Quality</option>
                    <option value="earthquakes">🌋 Max Earthquake Mag</option>
                    <option value="crypto">₿ Crypto Price</option>
                    <option value="exchange_rates">💱 Exchange Rate</option>
                    <option value="github">💻 GitHub Top Stars</option>
                    <option value="hackernews">📰 HN Top Score</option>
                    <option value="reddit">🔴 Reddit Top Score</option>
                    <option value="stackoverflow">📚 SO Top Score</option>
                </select>
                <select id="itItem"><option value="">— Item —</option></select>
                <input type="date" id="itStart">
                <span style="color:var(--text2);">–</span>
                <input type="date" id="itEnd">
                <button onclick="loadIntertemporal()">Plot</button>
            </div>
            <div class="it-chart-wrap"><canvas id="itChart"></canvas></div>
            <div id="itStatus"></div>
        </div>
        
        <!-- Dashboard Grid -->
        <div class="main-grid" id="dashboardGrid">
            <div class="loading-wrap"><div class="loader"></div><p style="margin-top:14px;color:var(--text2);">Loading snapshot...</p></div>
        </div>
    </div>

    <script>
        // ============ CONFIG ============
        const RAW = 'https://raw.githubusercontent.com/edthedog-debug/internet-time-capsule/main/capsules';
        const BAR_COLORS = ['#0a84ff','#bf5af2','#ff375f','#30d158','#ff9f0a','#64d2ff','#ff6482','#5e5ce6','#ffd60a','#ac8e68','#ff453a','#32d74b'];
        
        // ============ HELPERS ============
        function todayPath() { 
            const d = new Date(); 
            return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; 
        }
        
        function fmt(n) { 
            if (n == null || n === 0) return '—'; 
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B'; 
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; 
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; 
            return n.toLocaleString(); 
        }
        
        async function fJSON(url) { 
            try { 
                const r = await fetch(url); 
                if (!r.ok) throw new Error('HTTP ' + r.status); 
                return await r.json(); 
            } catch(e) { 
                console.warn('Failed to fetch:', url, e.message); 
                return null; 
            } 
        }
        
        async function loadDate(datePath) {
            const b = `${RAW}/${datePath}/global`;
            const d = {};
            const files = [
                'github_trending','hackernews','stackoverflow','reddit',
                'exchange_rates','crypto','earthquakes',
                'nasa_apod','iss_position','people_in_space',
                'all_countries','holidays_today','weather_25_cities','covid_global'
            ];
            
            for (const f of files) {
                d[f] = await fJSON(`${b}/${f}.json`);
            }
            
            for (const l of ['en','es','fr','de','ja']) {
                d[`wiki_${l}`] = await fJSON(`${b}/wikipedia_${l}.json`);
            }
            
            for (const c of ['nyc','london','tokyo','delhi','sao_paulo']) {
                d[`aq_${c}`] = await fJSON(`${b}/air_quality_${c}.json`);
            }
            
            return d;
        }
        
        function hasData(d) { 
            if (!d) return false;
            return Object.values(d).some(v => 
                (Array.isArray(v) && v.length > 0) || 
                (v && typeof v === 'object' && !Array.isArray(v) && Object.keys(v).length > 0)
            ); 
        }
        
        // ============ BAR CHARTS ============
        function barChart(id, labels, values, colorFn) {
            const ctx = document.getElementById(id); 
            if (!ctx) return;
            const existing = Chart.getChart(id);
            if (existing) existing.destroy();
            new Chart(ctx, {
                type: 'bar', 
                data: { 
                    labels, 
                    datasets: [{ 
                        data: values, 
                        backgroundColor: values.map((v,i) => colorFn ? colorFn(v,i) : BAR_COLORS[i % BAR_COLORS.length]), 
                        borderRadius: 8, 
                        borderSkipped: false 
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: {
                        x: { ticks: { color: '#98989d', font: { size: 10 }, maxRotation: 45 }, grid: { display: false } },
                        y: { ticks: { color: '#98989d', font: { size: 10 } }, grid: { color: '#ffffff04' } }
                    } 
                }
            });
        }
        
        function lineChart(id, labels, values, color) {
            const ctx = document.getElementById(id); 
            if (!ctx) return null;
            const existing = Chart.getChart(id); 
            if (existing) existing.destroy();
            return new Chart(ctx, {
                type: 'line', 
                data: { 
                    labels, 
                    datasets: [{ 
                        data: values, 
                        borderColor: color || '#0a84ff', 
                        backgroundColor: (color || '#0a84ff') + '18', 
                        borderWidth: 2.5, 
                        tension: 0.35, 
                        pointRadius: 1.5, 
                        pointHoverRadius: 5, 
                        fill: true 
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: {
                        x: { ticks: { color: '#98989d', font: { size: 10 }, maxTicksLimit: 14 }, grid: { color: '#ffffff04' } },
                        y: { ticks: { color: '#98989d', font: { size: 10 } }, grid: { color: '#ffffff04' } }
                    } 
                }
            });
        }
        
        // ============ CARD BUILDER ============
        function card(icon, title, subtitle, badge, badgeClass, chartId, tableRows, headers, full) {
            const chartDiv = chartId ? `<div class="chart-area"><canvas id="${chartId}"></canvas></div>` : '';
            const tbl = tableRows && tableRows.length > 0 ? 
                `<table class="tbl"><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${tableRows.map(r => `<tr>${r.map((c,i) => `<td class="${i === headers.length-1 || i === headers.length-2 ? 'num' : ''}">${c}</td>`).join('')}</tr>`).join('')}</tbody></table>` : '';
            return `<div class="card${full ? ' full-width' : ''}">
                <div class="card-header"><span class="card-icon">${icon}</span><div class="card-info"><div class="card-title">${title}</div><div class="card-subtitle">${subtitle}</div></div><span class="card-badge ${badgeClass}">${badge}</span></div>
                ${chartDiv}${tbl}</div>`;
        }
        
        // ============ RENDER ============
        function render(data) {
            const grid = document.getElementById('dashboardGrid');
            let html = '';
            const charts = [];
            
            // WEATHER (bar chart - comparable temperatures)
            const we = data.weather_25_cities;
            if (we && typeof we === 'object') {
                const cities = Object.entries(we).filter(function(entry) {
                    var v = entry[1];
                    return v && v.temp != null;
                }).sort(function(a, b) { return b[1].temp - a[1].temp; });
                if (cities.length > 0) {
                    var id = 'b_weather';
                    html += card('🌤️','Global Temperatures','Comparison across major cities','comparable','badge-nature',id,
                        cities.slice(0,10).map(function(city) {
                            var n = city[0], v = city[1];
                            return [n.replace(/_/g,' '), '<span style="color:' + (v.temp>30?'#ff453a':v.temp>20?'#ff9f0a':v.temp>10?'#30d158':'#64d2ff') + '">' + v.temp + '°C</span>', v.humidity ? v.humidity+'%' : '—', v.wind ? v.wind+' km/h' : '—'];
                        }),
                        ['City','Temp','Humidity','Wind']);
                    var top15 = cities.slice(0,15);
                    charts.push({id: id, labels: top15.map(function(c) { return c[0].replace(/_/g,' '); }), values: top15.map(function(c) { return c[1].temp; }), color: function(v) { return v>30?'#ff453a':v>20?'#ff9f0a':v>10?'#30d158':'#64d2ff'; }});
                }
            }
            
            // AIR QUALITY (bar chart - comparable)
            var aqKeys = ['nyc','london','tokyo','delhi','sao_paulo'];
            var aqAll = aqKeys.map(function(k) { return data['aq_' + k]; }).filter(Boolean);
            if (aqAll.length > 0) {
                var id = 'b_aq';
                html += card('🌬️','Air Quality Index','Comparison across cities','comparable','badge-nature',id,
                    aqAll.map(function(a) { return [(a.city||'?').toUpperCase(), '<span style="color:' + ((a.aqi||0)>100?'#ff453a':(a.aqi||0)>50?'#ff9f0a':'#30d158') + '">' + (a.aqi||'—') + '</span>', (a.pm25||'—')+' µg', (a.pm10||'—')+' µg']; }),
                    ['City','AQI','PM2.5','PM10']);
                charts.push({id: id, labels: aqAll.map(function(a) { return (a.city||'?').toUpperCase(); }), values: aqAll.map(function(a) { return a.aqi||0; }), color: function(v) { return v>100?'#ff453a':v>50?'#ff9f0a':'#30d158'; }});
            }
            
            // EARTHQUAKES (bar chart - comparable magnitudes)
            var eq = data.earthquakes;
            if (eq && Array.isArray(eq) && eq.length > 0) {
                var id = 'b_eq';
                var sorted = eq.slice().sort(function(a, b) { return (b.magnitude||0) - (a.magnitude||0); });
                html += card('🌋','Seismic Activity','Largest earthquakes today','comparable','badge-nature',id,
                    sorted.slice(0,10).map(function(q) { return [(q.place||'?').substring(0,40), '<span style="color:' + ((q.magnitude||0)>=5?'#ff453a':(q.magnitude||0)>=3?'#ff9f0a':'#30d158') + '">' + (q.magnitude||0).toFixed(1) + '</span>', q.depth ? q.depth.toFixed(0)+' km' : '—']; }),
                    ['Location','Mag','Depth']);
                var top10 = sorted.slice(0,10);
                charts.push({id: id, labels: top10.map(function(q) { return (q.place||'?').split(',')[0].substring(0,18); }), values: top10.map(function(q) { return q.magnitude||0; }), color: function(v) { return v>=5?'#ff453a':v>=3?'#ff9f0a':'#30d158'; }});
            }
            
            // EXCHANGE RATES (bar chart - comparable vs USD)
            var fx = data.exchange_rates;
            if (fx && fx.rates && Object.keys(fx.rates).length > 0) {
                var id = 'b_fx';
                var majors = ['EUR','GBP','JPY','CNY','INR','BRL','CAD','AUD','CHF','KRW','MXN','RUB'];
                var rates = majors.filter(function(c) { return fx.rates[c]; }).map(function(c) { return [c, fx.rates[c]]; });
                html += card('💱','Exchange Rates','vs USD • ' + Object.keys(fx.rates).length + ' currencies','comparable','badge-finance',id,
                    rates.slice(0,10).map(function(r) { return ['<strong>' + r[0] + '</strong>', r[1].toFixed(4)]; }),
                    ['Currency','Rate']);
                charts.push({id: id, labels: rates.map(function(r) { return r[0]; }), values: rates.map(function(r) { return r[1]; }), color: null});
            }
            
            // COUNTRIES POPULATION (bar chart - comparable)
            var cnt = data.all_countries;
            if (cnt && Array.isArray(cnt) && cnt.length > 0) {
                var id = 'b_cnt';
                var sorted = cnt.slice().sort(function(a, b) { return (b.population||0) - (a.population||0); });
                html += card('🌍','World Population',cnt.length + ' countries','comparable','badge-world',id,
                    sorted.slice(0,10).map(function(c) { return [c.country||'?', fmt(c.population), c.region||'—']; }),
                    ['Country','Population','Region']);
                var top12 = sorted.slice(0,12);
                charts.push({id: id, labels: top12.map(function(c) { return c.country||'?'; }), values: top12.map(function(c) { return c.population||0; }), color: null});
            }
            
            // SPACE (full-width card)
            var astro = data.people_in_space;
            var iss = data.iss_position;
            var nasa = data.nasa_apod;
            if (astro || iss || nasa) {
                var sh = '<div class="card full-width"><div class="card-header"><span class="card-icon">🛰️</span><div class="card-info"><div class="card-title">Space Explorer</div><div class="card-subtitle">ISS · NASA · Astronauts</div></div><span class="card-badge badge-space">LIVE</span></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;">';
                if (astro && astro.people && astro.people.length > 0) {
                    sh += '<div><h4 style="font-size:0.75rem;color:var(--text2);margin-bottom:8px;">🚀 ' + (astro.total||0) + ' People in Orbit</h4><div class="tags">' + astro.people.map(function(p) { return '<span class="tag">' + p.name + ' <span style="color:var(--text2);">' + p.craft + '</span></span>'; }).join('') + '</div></div>';
                }
                if (iss && iss.lat) {
                    sh += '<div><h4 style="font-size:0.75rem;color:var(--text2);margin-bottom:8px;">📍 ISS Position</h4><div style="font-size:1.6rem;font-weight:200;">' + parseFloat(iss.lat).toFixed(4) + '° / ' + parseFloat(iss.lon).toFixed(4) + '°</div></div>';
                }
